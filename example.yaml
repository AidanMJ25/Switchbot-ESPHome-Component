esphome:
  name: switchbot-curtain-bridge
  friendly_name: SwitchBot Curtain Bridge

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32_ble_tracker:

external_components:
  - source:
      type: local
      path: ./components

switchbot_curtain:
  - id: bedroom_curtain
    mac_address: "AA:BB:CC:DD:EE:FF"

cover:
  - platform: switchbot_curtain
    name: "Bedroom Curtain"
    switchbot_curtain_id: bedroom_curtain